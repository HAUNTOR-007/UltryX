}else{

  I.src=thumb;I.dataset.fullres=fullres;I.classList.add('loading-fr');SP.classList.add('on');

  hq.onerror=()=>{I.classList.remove('loading-fr');SP.classList.remove('on');};
  hq.src=fullres;
}}
